name: Build macOS Server

on:
  pull_request:
    branches: [ master ]
    paths:
      - 'server/**'
      - 'web-client/**'
      - '.github/workflows/build_macos.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4

    # --- 1. Build Web Client ---
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: './web-client/package-lock.json'

    - name: Build Web Client
      working-directory: ./web-client
      run: |
        npm ci
        npm run build

    # --- 2. Build Tauri Server ---
    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: x86_64-apple-darwin, aarch64-apple-darwin

    - name: Rust Cache
      uses: swatinem/rust-cache@v2
      with:
        workspaces: "./server -> target"

    - name: Build Tauri App
      working-directory: ./server
      env:
        TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
      run: npx @tauri-apps/cli build

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: RemoteMouse-macos
        path: |
          server/target/release/bundle/dmg/*.dmg
          server/target/release/bundle/macos/*.tar.gz*
